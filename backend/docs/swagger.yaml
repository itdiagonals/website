info:
  contact: {}
  description: Customer auth and product catalog API for the Diagonals website backend.
  title: Diagonals API
  version: "1.0"
paths:
  /api/v1/addresses:
    get:
      consumes:
      - application/json
      description: Get all detailed shipping addresses for the authenticated customer
        ordered by primary status first
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.CustomerAddressListResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get my addresses
      tags:
      - Addresses
    post:
      consumes:
      - application/json
      description: Add a detailed shipping address for the authenticated customer,
        including administrative regions, street details, and optional map pin metadata
        (latitude/longitude)
      parameters:
      - description: Customer address payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/handler.AddAddressRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/handler.CustomerAddressResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Add customer address
      tags:
      - Addresses
  /api/v1/addresses/{id}:
    put:
      consumes:
      - application/json
      description: Update an existing shipping address for the authenticated customer,
        including administrative regions, street details, and optional map pin metadata
        (latitude/longitude)
      parameters:
      - description: Address ID
        in: path
        name: id
        required: true
        type: integer
      - description: Customer address payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/handler.UpdateAddressRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.CustomerAddressResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update customer address
      tags:
      - Addresses
  /api/v1/auth/login:
    post:
      consumes:
      - application/json
      description: Authenticate a customer and create a new active session for the
        current device or browser
      parameters:
      - description: Login payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/handler.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.StatusResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      summary: Login customer account
      tags:
      - Auth
  /api/v1/auth/logout:
    post:
      description: Revoke the authenticated session for the current device or browser
        and clear auth cookies
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.StatusResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Logout current session
      tags:
      - Auth
  /api/v1/auth/logout-all:
    post:
      description: Revoke all active sessions for the authenticated customer and clear
        auth cookies on the current device
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.StatusResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Logout all sessions
      tags:
      - Auth
  /api/v1/auth/refresh:
    post:
      description: Validate the refresh token from HttpOnly cookie against the current
        session, rotate it, and update auth cookies
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.StatusResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      summary: Refresh access token
      tags:
      - Auth
  /api/v1/auth/register:
    post:
      consumes:
      - application/json
      description: Register a new customer in Go-owned tables and issue access and
        refresh tokens
      parameters:
      - description: Registration payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/handler.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/handler.StatusResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      summary: Register customer account
      tags:
      - Auth
  /api/v1/auth/sessions:
    get:
      description: List all active sessions for the authenticated customer across
        devices and browsers
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.AuthSessionsResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List active sessions
      tags:
      - Auth
  /api/v1/cart:
    get:
      consumes:
      - application/json
      description: Get the authenticated customer's Redis-backed shopping cart
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.CartResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get my cart
      tags:
      - Cart
  /api/v1/cart/add:
    post:
      consumes:
      - application/json
      description: Add a product to the authenticated customer's Redis-backed shopping
        cart
      parameters:
      - description: Cart item payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/handler.AddToCartRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.CartResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Add item to cart
      tags:
      - Cart
  /api/v1/cart/quantity:
    patch:
      consumes:
      - application/json
      description: Update the quantity of a specific cart item in the authenticated
        customer's cart by cart item id
      parameters:
      - description: Cart quantity update payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/handler.UpdateCartQuantityRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.CartResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update cart item quantity
      tags:
      - Cart
  /api/v1/cart/remove:
    delete:
      consumes:
      - application/json
      description: Remove a specific cart item from the authenticated customer's Redis-backed
        shopping cart by cart item id
      parameters:
      - description: Cart item removal payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/handler.RemoveFromCartRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.CartResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Remove item from cart
      tags:
      - Cart
  /api/v1/checkout:
    post:
      consumes:
      - application/json
      description: Validate the authenticated customer's address, selected cart items,
        shipping rate, and Midtrans payment request, then create a pending transaction
        and remove only the selected items from cart
      parameters:
      - description: Checkout payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/handler.CheckoutRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/handler.CheckoutResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Checkout current cart
      tags:
      - Checkout
  /api/v1/checkout/rates:
    post:
      consumes:
      - application/json
      description: Calculate Biteship courier and service options for the authenticated
        customer's selected cart items and shipping address
      parameters:
      - description: Shipping rates payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/handler.ShippingRatesRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.ShippingRatesResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get available checkout couriers
      tags:
      - Checkout
  /api/v1/payments/biteship/notification:
    post:
      consumes:
      - application/json
      description: Receive Biteship shipping webhook events and sync shipping status/tracking
        by Biteship order id. Empty body probe requests are acknowledged with 200
        for webhook installation checks.
      parameters:
      - description: Webhook secret (preferred header for real events)
        in: header
        name: X-Biteship-Webhook-Secret
        type: string
      - description: Webhook secret (fallback header for compatibility)
        in: header
        name: X-Webhook-Secret
        type: string
      - description: Webhook token passed in callback URL when custom headers are
          unavailable
        in: query
        name: token
        type: string
      - description: Biteship webhook payload; may be empty for installation probe
        in: body
        name: payload
        schema:
          additionalProperties: true
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: notification processed | notification ignored | notification
            probe acknowledged
          schema:
            $ref: '#/definitions/handler.StatusResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      summary: Receive Biteship shipping webhook
      tags:
      - Payments
  /api/v1/payments/midtrans/notification:
    post:
      consumes:
      - application/json
      description: Verify Midtrans signature and update transaction payment status
        by order id
      parameters:
      - description: Midtrans notification payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/handler.MidtransNotificationRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.StatusResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      summary: Receive Midtrans payment notification
      tags:
      - Payments
  /api/v1/products:
    get:
      consumes:
      - application/json
      description: Get all products from the backend-owned catalog read model, optionally
        filtered by category slug
      parameters:
      - description: Category slug
        in: query
        name: category
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.ProductListResponse'
