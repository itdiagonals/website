            $ref: '#/definitions/handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      summary: Get product by slug
      tags:
      - Products
  /api/v1/transactions:
    get:
      description: Get paginated transaction history for the authenticated customer,
        optionally filtered by payment status
      parameters:
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 10
        description: Items per page
        in: query
        name: limit
        type: integer
      - description: Filter by payment status (pending|paid|failed|refunded)
        in: query
        name: status
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.TransactionHistoryListResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get my transaction history
      tags:
      - Transactions
  /api/v1/transactions/{order_id}:
    get:
      description: Get one transaction detail by order id for the authenticated customer
      parameters:
      - description: Order ID
        in: path
        name: order_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.TransactionHistoryDetailResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get my transaction detail
      tags:
      - Transactions
  /api/v1/transactions/{order_id}/tracking:
    get:
      description: Get current shipping tracking data for a paid transaction. By default
        data is served from local transaction state; use refresh=true to fetch latest
        status and events from Biteship API.
      parameters:
      - description: Order ID
        in: path
        name: order_id
        required: true
        type: string
      - description: Refresh tracking from Biteship
        in: query
        name: refresh
        type: boolean
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.TransactionTrackingResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get my transaction tracking
      tags:
      - Transactions
  /api/v1/wilayah/search:
    get:
      consumes:
      - application/json
      description: Search wilayah master data for province, city, district, or village
        with optional parent filtering for cascading address forms
      parameters:
      - description: 'Wilayah level: province, city, district, village'
        in: query
        name: level
        type: string
      - description: Parent wilayah code for cascading search
        in: query
        name: parent_code
        type: string
      - description: Search keyword
        in: query
        name: query
        type: string
      - description: Maximum result count, default 50, max 100
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.WilayahListResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      summary: Search wilayah master data
      tags:
      - Wilayah
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
