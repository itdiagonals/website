services:
  postgres:
    image: postgres:16-alpine
    container_name: website-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-diagonals}
      POSTGRES_USER: ${POSTGRES_USER:-diagonals}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-diagonals}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - website_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-diagonals} -d ${POSTGRES_DB:-diagonals}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: website-redis
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-diagonals}"]
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - website_redis_data:/data
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: website-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - website_minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    container_name: website-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin} &&
      mc mb -p local/diagonals-media || true &&
      mc anonymous set private local/diagonals-media || true
      "
    restart: "no"

volumes:
  website_postgres_data:
  website_redis_data:
  website_minio_data:
  website_node_modules:
  website_pnpm_store:
