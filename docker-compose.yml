  payload-postgres:
    image: postgres:16-alpine
    container_name: website-payload-postgres
    environment:
      POSTGRES_DB: payload
      POSTGRES_USER: payload
      POSTGRES_PASSWORD: payload
    ports:
      - "5432:5432"
    volumes:
      - website_payload_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payload -d payload"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend-postgres:
    image: postgres:16-alpine
    container_name: website-backend-postgres
    environment:
      POSTGRES_DB: backend
      POSTGRES_USER: backend
      POSTGRES_PASSWORD: backend
    ports:
      - "5433:5432"
    volumes:
      - website_backend_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U backend -d backend"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: website-backend
    env_file:
      - ./backend/.env
    environment:
      BACKEND_DATABASE_URL: postgresql://backend:backend@backend-postgres:5432/backend
      REDIS_URL: redis://redis:6379
    ports:
      - "8080:8080"
    depends_on:
      backend-postgres:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/ping >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: website-redis
    ports:
      - "6379:6379"
    volumes:
      - website_redis_data:/data
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: website-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - website_minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    container_name: website-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb -p local/payload-media || true &&
      mc anonymous set private local/payload-media || true
      "
    restart: "no"

volumes:
  website_payload_postgres_data:
  website_backend_postgres_data:
  website_redis_data:
  website_minio_data:
  website_node_modules:
  website_pnpm_store: