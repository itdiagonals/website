name: Build and Push Images

on:
  push:
    branches:
      - dev
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    if: github.ref_name == 'dev' || github.ref_name == 'main'
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: diagonals-frontend
            dockerfile: ./Dockerfile
            context: .
          - image_name: diagonals-backend
            dockerfile: ./backend/Dockerfile
            context: ./backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set deployment channel
        id: channel
        shell: bash
        run: |
          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            echo "channel=production" >> "$GITHUB_OUTPUT"
          else
            echo "channel=staging" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image_name }}
          tags: |
            type=sha
            type=raw,value=${{ steps.channel.outputs.channel }}
            type=raw,value=${{ steps.channel.outputs.channel }}-latest

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger Dokploy deploy
        shell: bash
        env:
          BRANCH: ${{ github.ref_name }}
          BACKEND_WEBHOOK: ${{ github.ref_name == 'main' && secrets.DOKPLOY_BACKEND_WEBHOOK_URL_PROD || secrets.DOKPLOY_BACKEND_WEBHOOK_URL_DEV }}
          FRONTEND_WEBHOOK: ${{ github.ref_name == 'main' && secrets.DOKPLOY_FRONTEND_WEBHOOK_URL_PROD || secrets.DOKPLOY_FRONTEND_WEBHOOK_URL_DEV }}
        run: |
          echo "Deploying branch '${BRANCH}' to Dokploy..."

          if [ -z "${BACKEND_WEBHOOK}" ] || [ -z "${FRONTEND_WEBHOOK}" ]; then
            echo "::error::Missing webhook secret for branch '${BRANCH}'. Add DOKPLOY_*_WEBHOOK_URL_${BRANCH^^} (or _PROD) to repo secrets."
            exit 1
          fi

          if [ "${{ matrix.image_name }}" = "diagonals-backend" ]; then
            curl -fsS -X POST "${BACKEND_WEBHOOK}"
            echo "Triggered backend deploy for branch ${BRANCH}."
          fi

          if [ "${{ matrix.image_name }}" = "diagonals-frontend" ]; then
            curl -fsS -X POST "${FRONTEND_WEBHOOK}"
            echo "Triggered frontend deploy for branch ${BRANCH}."
          fi